name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pydantic-settings openai neo4j httpx "thefuzz[speedup]" numpy
          pip install pytest pytest-cov pytest-asyncio ruff

      - name: Lint with ruff
        run: ruff check ramayana_kg/ tests/

      - name: Run tests
        env:
          OPENAI_API_KEY: test-key
          NEO4J_URI: bolt://localhost:7687
          NEO4J_PASSWORD: test-password
        run: pytest tests/ -v --cov=ramayana_kg --cov-report=term-missing
